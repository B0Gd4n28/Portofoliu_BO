[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/aseets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[redirects]]
  from = "/portfolio"
  to = "/portofoliu.html"
  status = 301

[[redirects]]
  from = "/services"
  to = "/servicii.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/despre.html"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 301
